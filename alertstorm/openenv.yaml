name: "alertstorm"
description: "A highly realistic SRE RCA simulator where an agent investigates cascading microservice failures."
version: "1.0.0"
spec_version: "1.0"
tasks:
  - id: "standard_easy"
    description: "Deep Linear Cascade: Bottom layer failure bubbling to the API Gateway."
  - id: "standard_medium"
    description: "The 3rd Party Lie: Identifying ghost metrics in external services."
  - id: "standard_hard"
    description: "The Split Brain: Double simultaneous catastrophic data-layer failure."
  - id: "enterprise_easy"
    description: "29-Node Linear Cascade: Navigating deep backend microservices."
  - id: "enterprise_medium"
    description: "29-Node Distractor: Large enterprise routing with flanking noise instances."
  - id: "enterprise_hard"
    description: "29-Node Split Brain: Dual catastrophic failure deep in the ElasticSearch/Kafka topology."
author: "SRE Simulator Team"
