name: "alertstorm"
description: "A realistic SRE root-cause analysis environment with cascading microservice failure simulation."
version: "1.0.0"
spec_version: "1.0"
tasks:
  - id: "standard_easy"
    description: "8-node linear cascade with a single clear root cause."
  - id: "standard_medium"
    description: "8-node cascade with injected noise alerts requiring suppression."
  - id: "standard_hard"
    description: "8-node split-brain incident with dual simultaneous root causes."
  - id: "enterprise_easy"
    description: "29-node enterprise cascade with a single clear root cause."
  - id: "enterprise_medium"
    description: "29-node enterprise cascade with multiple distractor alerts."
  - id: "enterprise_hard"
    description: "29-node enterprise split-brain with high distractor volume."
author: "AlertStorm Team"
license: "BSD-3-Clause"
repo: "https://huggingface.co/spaces/alertstorm/simulator"
